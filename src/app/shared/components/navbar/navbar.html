<header
    class="flex items-center justify-between border-b border-ink/10 bg-paper/95 px-6 py-4 backdrop-blur lg:px-10">
    <div class="flex items-center gap-3">
        <button
            type="button"
            class="flex h-11 w-11 items-center justify-center rounded-sm text-ink/60 hover:text-ink lg:hidden"
            aria-label="Toggle menu"
            (click)="menuToggle.emit()">
            <svg
                class="h-6 w-6"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75">
                <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" />
            </svg>
        </button>
        <div>
            <h1
                class="font-display text-lg font-semibold tracking-tight text-ink">
                Overview
            </h1>
            <p class="text-xs text-ink/45">
                {{ lastSynced() }}
            </p>
        </div>
    </div>

    <div class="flex items-center gap-3">

        <div class="relative">
            <button
                type="button"
                class="flex items-center gap-2.5 rounded-sm border border-transparent bg-transparent px-3 py-2 text-left hover:bg-paper-soft"
                aria-haspopup="true"
                [attr.aria-expanded]="menuOpen()"
                (click)="toggleMenu()">
                <div
                    class="flex h-8 w-8 items-center justify-center rounded-full bg-teal font-display text-xs font-semibold text-white">
                    {{ userInitials() }}
                </div>
                <div class="hidden leading-tight sm:block">
                    <p
                        class="text-sm font-medium text-ink">{{loggedUser()?.name
                        | titlecase }}</p>
                    <p class="text-[11px] text-ink/45">Admin</p>
                </div>
            </button>

            <div
                *ngIf="menuOpen()"
                class="absolute right-0 z-10 mt-2 min-w-[12rem] overflow-hidden rounded-sm border border-ink/10 bg-white shadow-card">
                <button
                    type="button"
                    class="w-full px-4 py-3 text-left text-sm text-ink transition-colors hover:bg-paper-soft"
                    (click)="handleAction('profile')">
                    Profile
                </button>
                <button
                    type="button"
                    class="w-full px-4 py-3 text-left text-sm text-ink transition-colors hover:bg-paper-soft"
                    (click)="handleAction('settings')">
                    Settings
                </button>
                <button
                    type="button"
                    class="w-full px-4 py-3 text-left text-sm text-ink transition-colors hover:bg-paper-soft"
                    (click)="logout()">
                    Logout
                </button>
            </div>
        </div>
    </div>
</header>
