<header
    class="flex items-center justify-between border-b border-ink/10 bg-paper/95 px-6 py-4 backdrop-blur lg:px-10">
    <div class="flex items-center gap-3">
        <button
            type="button"
            class="flex h-11 w-11 items-center justify-center rounded-sm text-ink/60 hover:text-ink lg:hidden"
            aria-label="Toggle menu"
            (click)="menuToggle.emit()">
            <svg
                class="h-6 w-6"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75">
                <path d="M4 6h16M4 12h16M4 18h16" stroke-linecap="round" />
            </svg>
        </button>
        <div>
            <h1 class="font-display text-lg font-semibold tracking-tight text-ink">
                Overview
            </h1>
            <p class="text-xs text-ink/45">
                {{ lastSynced() }}
            </p>
        </div>
    </div>

    <div class="flex items-center gap-3">
        <label class="relative hidden sm:block">
            <svg
                class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-ink/35"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75">
                <circle cx="11" cy="11" r="7" />
                <path d="m20 20-3-3" stroke-linecap="round" />
            </svg>
            <input
                type="text"
                placeholder="Search orders, customers…"
                class="w-64 rounded-sm border border-ink/10 bg-white py-2 pl-9 pr-3 text-sm text-ink placeholder:text-ink/35 focus:outline-none focus-visible:outline-2 focus-visible:outline-teal" />
        </label>

        <button
            type="button"
            class="relative flex h-9 w-9 items-center justify-center rounded-sm border border-ink/10 bg-white text-ink/60 hover:text-ink"
            aria-label="Notifications">
            <svg
                class="h-[18px] w-[18px]"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75">
                <path
                    d="M6 8a6 6 0 1 1 12 0c0 4 1.5 5.5 1.5 5.5H4.5S6 12 6 8Z"
                    stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M9.5 17a2.5 2.5 0 0 0 5 0" stroke-linecap="round" />
            </svg>
            <span
                class="absolute right-1.5 top-1.5 h-1.5 w-1.5 rounded-full bg-coral"></span>
        </button>

        <div class="relative">
            <button
                type="button"
                class="flex items-center gap-2.5 rounded-sm border border-transparent bg-transparent px-3 py-2 text-left hover:bg-paper-soft"
                aria-haspopup="true"
                [attr.aria-expanded]="menuOpen()"
                (click)="toggleMenu()">
                <div
                    class="flex h-8 w-8 items-center justify-center rounded-full bg-teal font-display text-xs font-semibold text-white">
                    MA
                </div>
                <div class="hidden leading-tight sm:block">
                    <p
                        class="text-sm font-medium text-ink">{{loggedUser()?.name}}</p>
                    <p class="text-[11px] text-ink/45">Admin</p>
                </div>
            </button>

            <div
                *ngIf="menuOpen()"
                class="absolute right-0 z-10 mt-2 min-w-[12rem] overflow-hidden rounded-sm border border-ink/10 bg-white shadow-card">
                <button
                    type="button"
                    class="w-full px-4 py-3 text-left text-sm text-ink transition-colors hover:bg-paper-soft"
                    (click)="handleAction('profile')">
                    Profile
                </button>
                <button
                    type="button"
                    class="w-full px-4 py-3 text-left text-sm text-ink transition-colors hover:bg-paper-soft"
                    (click)="handleAction('settings')">
                    Settings
                </button>
                <button
                    type="button"
                    class="w-full px-4 py-3 text-left text-sm text-ink transition-colors hover:bg-paper-soft"
                    (click)="logout()">
                    Logout
                </button>
            </div>
        </div>
    </div>
</header>
